name: fgitness
description: Fitness tracker and nutrition helper in one. Accompanies the user through the day.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.0
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.0
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.5.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
